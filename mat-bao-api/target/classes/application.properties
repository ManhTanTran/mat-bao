spring.application.name=mat-bao-api
server.port=8080

# =============================================
# Open-Meteo API config (miễn phí, không cần key)
# =============================================
openmeteo.base-url=https://api.open-meteo.com/v1/forecast

# Tọa độ mặc định — Quảng Bình (vùng hay bão lũ nhất VN)
openmeteo.default.latitude=17.4833
openmeteo.default.longitude=106.6000

# Các thông số thời tiết cần lấy
openmeteo.hourly-params=temperature_2m,relative_humidity_2m,precipitation,wind_speed_10m,wind_direction_10m,surface_pressure
openmeteo.daily-params=precipitation_sum,wind_speed_10m_max,temperature_2m_max,temperature_2m_min

# =============================================
# Ngưỡng cảnh báo (có thể chỉnh tùy địa phương)
# =============================================
alert.rain.warning=30.0
alert.rain.danger=50.0
alert.wind.warning=60.0
alert.wind.danger=90.0

# =============================================
# Cache config
# =============================================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=3600s

# =============================================
# CORS cho frontend dashboard
# =============================================
cors.allowed-origins=http://localhost:3000,http://localhost:5173,*

# =============================================
# Logging
# =============================================
logging.level.com.matbao=DEBUG
logging.level.org.springframework.web=INFO

ai.service.url=http://localhost:8000
